# ============================================================
# Multi-Agent System — docker-compose.yml
# ============================================================

# Reusable fragments ──────────────────────────────────────
x-common-env: &common-env
  TZ: ${TZ:-UTC}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: json

x-logging: &default-logging
  driver: "fluentd"
  options:
    fluentd-address: "fluentd:24224"
    fluentd-async: "true"
    tag: "{{.Name}}"

# ── Networks ────────────────────────────────────────────────
networks:
  backend:
    driver: bridge

# ── Persistent volumes ──────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  fluentd_logs:
    driver: local

services:

  # ── 1. Logging service (Fluentd) ──────────────────────────
  fluentd:
    image: fluent/fluentd:v1.17-debian-1
    container_name: ${COMPOSE_PROJECT_NAME:-mas}_fluentd
    restart: unless-stopped

    environment:
      <<: *common-env

    ports:
      - "${FLUENTD_HOST_PORT:-24224}:24224"
      - "${FLUENTD_HOST_PORT:-24224}:24224/udp"

    volumes:
      - fluentd_logs:/fluentd/log
      - ./infra/fluentd/fluent.conf:/fluentd/etc/fluent.conf:ro

    networks:
      - backend

  # ── 2. PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-mas}_postgres
    restart: unless-stopped

    environment:
      <<: *common-env
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata

    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

    depends_on:
      - fluentd

    logging: *default-logging

    networks:
      - backend

  # ── 3. API Server ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api

    image: ${COMPOSE_PROJECT_NAME:-mas}/api:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-mas}_api
    restart: unless-stopped

    environment:
      <<: *common-env
      SERVICE: api
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_SECRET_KEY: ${API_SECRET_KEY}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_WORKERS: ${API_WORKERS:-2}
      API_RELOAD: ${API_RELOAD:-false}
      FLUENTD_HOST: fluentd
      FLUENTD_PORT: 24224

    ports:
      - "${API_HOST_PORT:-8000}:8000"

    volumes:
      - .:/app:ro

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 25s
      retries: 3

    depends_on:
      postgres:
        condition: service_healthy
      fluentd:
        condition: service_started

    logging: *default-logging

    networks:
      - backend

  # ── 4. Worker ─────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: worker

    image: ${COMPOSE_PROJECT_NAME:-mas}/worker:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-mas}_worker

    # IMPORTANT:
    # Prevent Docker from restarting the worker
    # after the test script exits successfully.
    restart: "no"

    environment:
      <<: *common-env
      SERVICE: worker
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_BASE_URL: http://api:8000
      API_SECRET_KEY: ${API_SECRET_KEY}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      WORKER_QUEUE: ${WORKER_QUEUE:-default}
      FLUENTD_HOST: fluentd
      FLUENTD_PORT: 24224

    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      fluentd:
        condition: service_started

    logging: *default-logging

    networks:
      - backend