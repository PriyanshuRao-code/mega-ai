# ============================================================
# infra/fluentd/fluent.conf
# Accepts structured JSON logs forwarded by Docker containers,
# enriches them, and writes to rotated files.
# ============================================================

<source>
  @type forward
  port 24224
  bind 0.0.0.0
  @label @MAIN
</source>

<label @MAIN>
  # Parse the inner JSON payload if present
  <filter **>
    @type parser
    key_name log
    reserve_data true
    remove_key_name_field false
    <parse>
      @type json
      time_key time
      time_format %Y-%m-%dT%H:%M:%SZ
    </parse>
  </filter>

  # Emit to stdout (visible in `docker-compose logs fluentd`)
  <match **>
    @type copy

    <store>
      @type stdout
      output_type json
    </store>

    # Persist structured logs to /fluentd/log/<container_tag>/YYYY-MM-DD.log
    <store>
      @type file
      path /fluentd/log/${tag}/%Y-%m-%d
      append true
      compress gzip
      <buffer tag,time>
        timekey 1d
        timekey_use_utc true
        flush_interval 10s
      </buffer>
      <format>
        @type json
      </format>
    </store>
  </match>
</label>
